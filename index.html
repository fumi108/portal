<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeLab Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f12; --bg-card: #13161b; --bg-card-hover: #1a1e26;
    --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.14);
    --text: #e8eaf0; --text-muted: #5a6270; --text-dim: #3a4050;
    --green: #3ddc84; --teal: #38c9b0; --amber: #f0a030;
    --blue: #4fa3e0; --red: #e05a5a; --purple: #9d7cf0;
    --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--mono);
    min-height: 100vh; padding: 40px 32px 60px;
    max-width: 960px; margin: 0 auto;
  }
  header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 48px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .site-name { font-family: var(--sans); font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; margin-bottom: 6px; }
  .site-name span { color: var(--green); }
  .site-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .header-right { text-align: right; }
  #clock { font-size: 22px; font-weight: 300; letter-spacing: 0.04em; line-height: 1; margin-bottom: 4px; }
  #date  { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; }
  /* ── 検索行（検索バー + ビュー切替） ──────────── */
  .search-row { display: flex; gap: 10px; align-items: stretch; margin-bottom: 12px; }
  .search-row .search-wrap { flex: 1; margin-bottom: 0; }
  .view-toggle {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted); cursor: pointer;
    font-size: 17px; padding: 0 15px; flex-shrink: 0;
    transition: border-color .18s, color .18s;
  }
  .view-toggle:hover { border-color: var(--border-hover); color: var(--text); }
  .view-toggle.active { border-color: var(--green); color: var(--green); }

  /* ── 検索バー ─────────────────────────────────── */
  .search-wrap { position: relative; }
  .search-wrap .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none; line-height: 1;
    font-size: 13px; opacity: 0.6;
  }
  #search {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 80px 11px 40px;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    outline: none; transition: border-color .18s, box-shadow .18s;
    letter-spacing: 0.03em;
  }
  #search:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 1px var(--green), 0 0 12px rgba(61,220,132,0.08);
  }
  #search::placeholder { color: var(--text-dim); }
  .search-count {
    position: absolute; right: 38px; top: 50%; transform: translateY(-50%);
    font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em;
    pointer-events: none; opacity: 0; transition: opacity .15s;
  }
  .search-count.visible { opacity: 1; }
  .search-clear {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 2px 4px; opacity: 0;
    transition: opacity .15s; pointer-events: none;
  }
  .search-clear.visible { opacity: 0.5; pointer-events: auto; }
  .search-clear:hover { opacity: 1; }

  /* ── カテゴリチップ ───────────────────────────── */
  .cat-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 28px; }
  .cat-chip {
    background: none; border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 10px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim); cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .cat-chip:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .cat-chip.active { border-color: var(--green); color: var(--green); }

  /* ── 検索結果なし ─────────────────────────────── */
  .no-results {
    text-align: center; padding: 48px 0; color: var(--text-muted);
    font-size: 12px; letter-spacing: 0.06em; display: none;
  }
  .no-results span { color: var(--text-dim); }

  /* ── セクション ───────────────────────────────── */
  .section { margin-bottom: 36px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-dim); font-weight: 500; white-space: nowrap; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }

  /* ── カード（グリッドモード） ─────────────────── */
  .card {
    display: block; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 18px; text-decoration: none; color: inherit;
    transition: background .18s, border-color .18s, transform .18s;
    position: relative; overflow: hidden; height: 112px;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--accent-color, transparent); border-radius: 8px 0 0 8px;
    opacity: 0; transition: opacity .18s;
  }
  .card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }
  .card:hover .card-url { color: var(--text); }
  .card-icon { font-size: 18px; margin-bottom: 10px; display: block; line-height: 1; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; letter-spacing: 0.02em; }
  .card-desc { font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .card-url  { font-size: 10px; color: var(--text-dim); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .18s; }
  .card-badge {
    position: absolute; top: 12px; right: 12px; font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 2px 6px; border-radius: 3px; font-weight: 500;
    opacity: 0.7; background: rgba(255,255,255,0.07); color: var(--text-muted);
  }

  /* ── 矢印キーフォーカス ──────────────────────── */
  .card-focused {
    background: var(--bg-card-hover) !important;
    border-color: rgba(61,220,132,0.45) !important;
    transform: translateY(-2px);
  }
  .card-focused::before { opacity: 1 !important; }

  /* ── リストモード（grid で列揃え） ────────────── */
  #main.list-view .grid { grid-template-columns: 1fr; gap: 6px; }
  #main.list-view .card {
    height: auto; min-height: 44px;
    display: grid;
    grid-template-columns: 22px 120px 1fr 150px 54px;
    grid-template-areas: "icon name desc url badge";
    column-gap: 14px;
    align-items: center;
    padding: 10px 16px;
  }
  #main.list-view .card-icon  { grid-area: icon;  font-size: 15px; margin-bottom: 0; }
  #main.list-view .card-name  { grid-area: name;  font-size: 12px; margin-bottom: 0; }
  #main.list-view .card-desc  { grid-area: desc;  margin-bottom: 0; min-width: 0; }
  #main.list-view .card-url   { grid-area: url;   text-align: right; }
  #main.list-view .card-badge { grid-area: badge; position: static; text-align: center; }

  /* ── 検索ハイライト ───────────────────────────── */
  .card.hidden { display: none; }
  mark {
    background: rgba(61,220,132,0.22); color: var(--green);
    border-radius: 2px; padding: 0 1px; font-style: normal;
  }

  /* ── フッター ─────────────────────────────────── */
  .load-error { font-size: 12px; color: var(--red); padding: 20px 0; letter-spacing: 0.04em; }
  .prompt-line { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); }
  .cursor { display: inline-block; width: 8px; height: 14px; background: var(--green); opacity: 0.6; border-radius: 1px; animation: blink 1.1s step-start infinite; }
  @keyframes blink { 50%{opacity:0} }

  @media (max-width:520px) {
    body { padding: 24px 16px 40px; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-right { text-align: left; }
    .grid { grid-template-columns: 1fr 1fr; }
    #main.list-view .card-url { display: none; }
    .memo-panel { width: 100vw; }
  }

  /* ── メモ ───────────────────────────────────── */
  .memo-toggle {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); cursor: pointer; font-family: var(--mono);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 9px; margin-top: 8px;
    transition: border-color .15s, color .15s;
  }
  .memo-toggle::after { content: ' ▾'; font-size: 8px; vertical-align: middle; }
  .memo-toggle.active::after { content: ' ▴'; }
  .memo-toggle:hover, .memo-toggle.active { border-color: var(--green); color: var(--green); }
  /* インラインセクション */
  .memo-section {
    overflow: hidden; max-height: 0;
    transition: max-height .3s ease, margin-bottom .3s ease;
    margin-bottom: 0;
  }
  .memo-section.open { max-height: 600px; margin-bottom: 20px; }
  .memo-section-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 14px;
  }
  .memo-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.12em; }
  .memo-close {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 14px; padding: 2px 4px; transition: color .15s;
  }
  .memo-close:hover { color: var(--text); }
  .memo-content {
    max-height: 300px; overflow-y: auto;
    font-size: 12px; line-height: 1.7; color: var(--text-muted);
  }
  .memo-empty { color: var(--text-dim); font-style: italic; }
  /* Markdown スタイル */
  .memo-content h1 { font-size: 15px; font-weight: 600; color: var(--text); margin: 0 0 16px; letter-spacing: 0.02em; }
  .memo-content h2 { font-size: 12px; font-weight: 500; color: var(--text); margin: 24px 0 10px; text-transform: uppercase; letter-spacing: 0.12em; }
  .memo-content h3 { font-size: 11px; color: var(--text-muted); margin: 16px 0 8px; letter-spacing: 0.06em; }
  .memo-content p  { margin: 0 0 10px; }
  .memo-content ul, .memo-content ol { padding-left: 18px; margin: 0 0 10px; }
  .memo-content li { margin: 3px 0; }
  .memo-content a  { color: var(--blue); text-decoration: none; }
  .memo-content a:hover { text-decoration: underline; }
  .memo-content code {
    background: rgba(255,255,255,0.06); border-radius: 3px;
    padding: 1px 5px; font-size: 11px; color: var(--green);
  }
  .memo-content pre {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px; overflow-x: auto; margin: 0 0 12px;
  }
  .memo-content pre code { background: none; padding: 0; color: var(--text-muted); }
  .memo-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .memo-content table { border-collapse: collapse; width: 100%; margin: 0 0 12px; font-size: 11px; }
  .memo-content th, .memo-content td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .memo-content th { color: var(--text); background: rgba(255,255,255,0.04); }
  .memo-content blockquote {
    border-left: 3px solid var(--border); margin: 0 0 12px; padding: 4px 14px;
    color: var(--text-dim); font-style: italic;
  }
  /* ── メモ編集モード ─────────────────────────────────────── */
  .memo-edit-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-muted); cursor: pointer; font-family: var(--mono);
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 8px; transition: border-color .15s, color .15s;
  }
  .memo-edit-btn:hover, .memo-edit-btn.active { border-color: var(--amber); color: var(--amber); }
  .memo-textarea {
    display: none;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    line-height: 1.7; letter-spacing: 0.02em;
    padding: 14px 16px; resize: vertical; outline: none; width: 100%;
    height: 260px; box-sizing: border-box;
  }
  .memo-textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }
  .memo-edit-actions {
    display: none;
    gap: 8px; padding: 10px 0 2px; align-items: center;
  }
  .memo-edit-actions.visible { display: flex; }
  .memo-save-btn {
    background: var(--amber); border: none; border-radius: 4px;
    color: #0d0f12; cursor: pointer; font-family: var(--mono);
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 5px 14px; transition: opacity .15s;
  }
  .memo-save-btn:hover { opacity: 0.85; }
  .memo-save-btn:disabled { opacity: 0.4; cursor: default; }
  .memo-cancel-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-muted); cursor: pointer; font-family: var(--mono);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 5px 12px; transition: border-color .15s, color .15s;
  }
  .memo-cancel-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .memo-status {
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em;
    transition: color .3s;
  }
  .memo-status.saved { color: var(--green); }
  .memo-status.error { color: var(--red); }
  /* ── Markdown ツールバー ─────────────────────────── */
  .memo-toolbar {
    display: none; position: relative;
    gap: 2px; padding: 6px 0; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .memo-toolbar.visible { display: flex; }
  .tb-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 4px; color: rgba(255,255,255,0.65); cursor: pointer;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    padding: 3px 8px; transition: border-color .15s, color .15s, background .15s;
    line-height: 1.4;
  }
  .tb-btn:hover { border-color: rgba(255,255,255,0.28); color: var(--text); background: rgba(255,255,255,0.10); }
  .tb-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.10); margin: 0 4px; flex-shrink: 0; }
  .tb-help-btn { margin-left: auto; }
  .tb-help-panel {
    position: fixed; background: var(--bg-card); border: 1px solid var(--border-hover);
    border-radius: 6px; padding: 10px 14px; z-index: 200;
    font-size: 10px; color: var(--text-muted);
    display: none; flex-direction: column; gap: 6px;
    white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .tb-help-panel.open { display: flex; }
  .tb-help-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
  kbd {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13);
    border-radius: 3px; padding: 1px 6px; font-family: var(--mono);
    font-size: 9px; color: var(--text); letter-spacing: 0.02em;
  }
  /* ── スクロールバー ─────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
  * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
  /* ── services モーダル ──────────────────────────── */
  .svc-modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    opacity: 0; pointer-events: none; z-index: 299; transition: opacity .2s;
  }
  .svc-modal-backdrop.open { opacity: 1; pointer-events: auto; }
  .svc-modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(.97);
    width: min(720px, 92vw); max-height: 82vh;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; z-index: 300; transition: opacity .2s, transform .2s;
  }
  .svc-modal.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
  .svc-modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .svc-modal-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.12em; }
  .svc-textarea {
    flex: 1; background: var(--bg); border: none; outline: none; resize: none;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    line-height: 1.7; padding: 16px 20px; min-height: 360px;
  }
  .svc-textarea:focus { box-shadow: inset 2px 0 0 var(--amber); }
  .svc-modal-footer {
    display: flex; gap: 8px; align-items: center;
    padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .svc-status { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; margin-left: auto; transition: color .3s; }
  .svc-status.saved { color: var(--green); }
  .svc-status.error { color: var(--red); }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
</head>
<body>

<header>
  <div>
    <div class="site-name">home<span>lab</span></div>
    <div class="site-sub">infrastructure portal</div>
  </div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div id="date">----/--/--</div>
    <button id="memo-toggle" class="memo-toggle" title="メモを開く">memo</button>
    <button id="svc-toggle" class="memo-toggle" title="services.js を編集">services</button>
  </div>
</header>

<section id="memo-section" class="memo-section">
  <div class="memo-section-bar">
    <span class="memo-title">// memo.md</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <span id="memo-status" class="memo-status"></span>
      <button id="memo-edit-btn" class="memo-edit-btn" title="編集 (e)">edit</button>
      <button id="memo-close" class="memo-close">✕</button>
    </div>
  </div>
  <div id="memo-content" class="memo-content"></div>
  <div id="memo-toolbar" class="memo-toolbar">
    <button class="tb-btn" data-md="bold"      title="Bold (⌘B)"><b>B</b></button>
    <button class="tb-btn" data-md="italic"    title="Italic (⌘I)"><i>I</i></button>
    <button class="tb-btn" data-md="strike"    title="打ち消し線">S̶</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-md="h1"        title="見出し1">H1</button>
    <button class="tb-btn" data-md="h2"        title="見出し2">H2</button>
    <button class="tb-btn" data-md="h3"        title="見出し3">H3</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-md="ul"        title="リスト">•—</button>
    <button class="tb-btn" data-md="ol"        title="番号リスト">1.</button>
    <button class="tb-btn" data-md="quote"     title="引用">&gt;</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-md="code"      title="インラインコード">`c`</button>
    <button class="tb-btn" data-md="codeblock" title="コードブロック">```</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-md="link"      title="リンク">link</button>
    <button class="tb-btn" data-md="checklist" title="チェックリスト">☑</button>
    <button class="tb-btn" data-md="table"     title="テーブル挿入">⊞</button>
    <button class="tb-btn" data-md="tablerow"  title="行を追加（カーソルがテーブル内）">+行</button>
    <button class="tb-btn" data-md="tablecol"  title="列を追加（カーソルがテーブル内）">+列</button>
    <button class="tb-btn" data-md="hr"        title="水平線">—</button>
    <button class="tb-btn" data-md="date"      title="今日の日付を挿入 (yyyy/mm/dd)">date</button>
    <button class="tb-btn" data-md="time"      title="現在時刻を挿入 (HH:MM)">time</button>
    <div class="tb-sep"></div>
    <button class="tb-btn tb-help-btn" id="tb-help-btn" title="ショートカット一覧">?</button>
    <div id="tb-help-panel" class="tb-help-panel"></div>
  </div>
  <textarea id="memo-textarea" class="memo-textarea" spellcheck="false" placeholder="# メモ&#10;&#10;ここに Markdown を書いてください…"></textarea>
  <div id="memo-edit-actions" class="memo-edit-actions">
    <button id="memo-save-btn" class="memo-save-btn">save</button>
    <button id="memo-cancel-btn" class="memo-cancel-btn">cancel</button>
  </div>
</section>

<div class="search-row">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="text" placeholder="サービスを検索… (Enter で最初の結果を開く)" autocomplete="off" spellcheck="false">
    <span id="search-count" class="search-count"></span>
    <button class="search-clear" id="search-clear" title="クリア">✕</button>
  </div>
  <button id="view-toggle" class="view-toggle" title="リスト表示に切替">≡</button>
</div>

<div id="cat-filter" class="cat-filter"></div>

<div id="no-results" class="no-results">
  <div>一致するサービスがありません</div>
  <span id="no-results-query"></span>
</div>

<div id="main"></div>

<div class="prompt-line">
  <span>fumi@homelab:~$</span>
  <span class="cursor"></span>
</div>

<div id="svc-backdrop" class="svc-modal-backdrop"></div>
<div id="svc-modal" class="svc-modal" role="dialog" aria-modal="true">
  <div class="svc-modal-header">
    <span class="svc-modal-title">// services.js</span>
    <button id="svc-close" class="memo-close">✕</button>
  </div>
  <textarea id="svc-textarea" class="svc-textarea" spellcheck="false"></textarea>
  <div class="svc-modal-footer">
    <button id="svc-save" class="memo-save-btn">save &amp; reload</button>
    <button id="svc-cancel" class="memo-cancel-btn">cancel</button>
    <span id="svc-status" class="svc-status"></span>
  </div>
</div>

<script src="./services.js"></script>

<script>
const ACCENT = {
  green:'var(--green)', teal:'var(--teal)', amber:'var(--amber)',
  blue:'var(--blue)',   red:'var(--red)',   purple:'var(--purple)',
};

// ── 時計 ────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('date').textContent  = `${n.getFullYear()}/${pad(n.getMonth()+1)}/${pad(n.getDate())} ${days[n.getDay()]}`;
}
tick(); setInterval(tick, 1000);

// ── テキストハイライト ───────────────────────────────────────
function highlight(text, query) {
  if (!query) return escHtml(text);
  const re = new RegExp(`(${escRe(query)})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

// ── カード HTML 生成 ─────────────────────────────────────────
function cardHtml(s, query) {
  const accent = ACCENT[s.accent] || 'transparent';
  const host   = (() => { try { return new URL(s.url).host; } catch { return s.url; } })();
  const badge  = s.badge ? `<div class="card-badge">${escHtml(s.badge)}</div>` : '';
  const desc   = s.description ? `<div class="card-desc">${highlight(s.description, query)}</div>` : '';
  return `<a class="card" href="${s.url}" target="_blank" style="--accent-color:${accent};"
            data-name="${escHtml(s.name)}"
            data-desc="${escHtml(s.description || '')}"
            data-badge="${escHtml(s.badge || '')}"
            data-url="${escHtml(s.url)}">
    <span class="card-icon">${s.icon}</span>
    <div class="card-name">${highlight(s.name, query)}</div>
    ${desc}
    <div class="card-url">${highlight(host, query)}</div>
    ${badge}
  </a>`;
}

// ── 描画 ────────────────────────────────────────────────────
function render(data, query = '') {

  document.getElementById('main').innerHTML = (data.categories || []).map(cat => `
    <div class="section" data-category="${escHtml(cat.label)}">
      <div class="section-header">
        <div class="section-label">${highlight(cat.label, query)}</div>
        <div class="section-line"></div>
      </div>
      <div class="grid">
        ${cat.services.map(s => cardHtml(s, query)).join('')}
      </div>
    </div>`).join('');
}

// ── フィルタ状態 ─────────────────────────────────────────────
let activeCat = '';

function applyFilter(query) {
  const q = query.trim().toLowerCase();
  let totalVisible = 0;

  document.querySelectorAll('.section').forEach(section => {
    const catLabel = section.dataset.category;
    if (activeCat && catLabel !== activeCat) {
      section.style.display = 'none';
      return;
    }
    const catLower = catLabel.toLowerCase();
    let sectionVisible = 0;

    section.querySelectorAll('.card').forEach(card => {
      const name  = card.dataset.name.toLowerCase();
      const desc  = card.dataset.desc.toLowerCase();
      const badge = card.dataset.badge.toLowerCase();
      const url   = card.dataset.url.toLowerCase();
      const match = !q || name.includes(q) || desc.includes(q) || badge.includes(q) || url.includes(q) || catLower.includes(q);
      card.classList.toggle('hidden', !match);
      if (match) sectionVisible++;
    });

    section.style.display = sectionVisible > 0 ? '' : 'none';
    totalVisible += sectionVisible;
  });

  const countEl = document.getElementById('search-count');
  if (q || activeCat) {
    countEl.textContent = `${totalVisible}件`;
    countEl.classList.add('visible');
  } else {
    countEl.classList.remove('visible');
  }

  const noResults = document.getElementById('no-results');
  noResults.style.display = totalVisible === 0 ? 'block' : 'none';
  document.getElementById('no-results-query').textContent = q ? `"${q}"` : '';
}

// ── カテゴリチップ ───────────────────────────────────────────
function initCatFilter(data) {
  const wrap = document.getElementById('cat-filter');
  const cats = (data.categories || []).map(c => c.label);

  wrap.innerHTML = ['', ...cats].map(cat => {
    const label = cat || 'ALL';
    return `<button class="cat-chip${cat === '' ? ' active' : ''}" data-cat="${escHtml(cat)}">${escHtml(label)}</button>`;
  }).join('');

  wrap.addEventListener('click', e => {
    const chip = e.target.closest('.cat-chip');
    if (!chip) return;
    activeCat = chip.dataset.cat;
    wrap.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c === chip));
    const q = document.getElementById('search').value;
    render(data, q);
    applyFilter(q);
    // リストモードの状態を再適用
    document.getElementById('main').classList.toggle('list-view', isListView);
  });
}

// ── ビュー切替 ───────────────────────────────────────────────
let isListView = localStorage.getItem('viewMode') === 'list';

function applyViewMode() {
  document.getElementById('main').classList.toggle('list-view', isListView);
  const btn = document.getElementById('view-toggle');
  btn.textContent = isListView ? '▦' : '≡';
  btn.title = isListView ? 'グリッド表示に切替' : 'リスト表示に切替';
  btn.classList.toggle('active', isListView);
}

function initViewToggle() {
  applyViewMode();
  document.getElementById('view-toggle').addEventListener('click', () => {
    isListView = !isListView;
    localStorage.setItem('viewMode', isListView ? 'list' : 'grid');
    applyViewMode();
  });
}

// ── 矢印キーナビゲーション ───────────────────────────────────
let focusedIdx = -1;

function visibleCards() {
  return [...document.querySelectorAll('.card:not(.hidden)')];
}

function moveFocus(delta) {
  const cards = visibleCards();
  if (!cards.length) return;
  document.querySelectorAll('.card-focused').forEach(c => c.classList.remove('card-focused'));
  focusedIdx = (focusedIdx + delta + cards.length) % cards.length;
  cards[focusedIdx].classList.add('card-focused');
  cards[focusedIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function resetFocus() {
  focusedIdx = -1;
  document.querySelectorAll('.card-focused').forEach(c => c.classList.remove('card-focused'));
}

// ── 検索バーイベント ─────────────────────────────────────────
function initSearch(data) {
  const input = document.getElementById('search');
  const clear = document.getElementById('search-clear');

  input.addEventListener('input', () => {
    const q = input.value;
    clear.classList.toggle('visible', q.length > 0);
    render(data, q);
    applyFilter(q);
    applyViewMode();
    resetFocus();
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(+1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); return; }
    if (e.key === 'Enter') {
      const cards = visibleCards();
      const target = focusedIdx >= 0 ? cards[focusedIdx] : cards[0];
      if (target) window.open(target.href, '_blank');
    }
  });

  clear.addEventListener('click', () => {
    input.value = '';
    clear.classList.remove('visible');
    render(data, '');
    applyFilter('');
    applyViewMode();
    resetFocus();
    input.focus();
  });

  // / または Cmd+K / Ctrl+K でフォーカス
  document.addEventListener('keydown', e => {
    const isMeta = e.metaKey || e.ctrlKey;
    const inMemoTextarea = document.activeElement === document.getElementById('memo-textarea');
    if ((e.key === '/' || (isMeta && e.key === 'k')) && document.activeElement !== input && !inMemoTextarea) {
      e.preventDefault();
      input.focus();
    }
    if (e.key === 'Escape' && document.activeElement === input) {
      input.blur();
    }
  });
}

// ── メモドロワー ─────────────────────────────────────────────
async function loadMemo() {
  try {
    const res = await fetch('./memo.md');
    if (!res.ok) return '';
    return await res.text();
  } catch { return ''; }
}

async function saveMemo(text) {
  const res = await fetch('/memo.md', {
    method: 'PUT',
    headers: { 'Content-Type': 'text/markdown; charset=utf-8' },
    body: text,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

function initMemo() {
  const toggle    = document.getElementById('memo-toggle');
  const section   = document.getElementById('memo-section');
  const closeBtn  = document.getElementById('memo-close');
  const content   = document.getElementById('memo-content');
  const editBtn   = document.getElementById('memo-edit-btn');
  const textarea  = document.getElementById('memo-textarea');
  const toolbar   = document.getElementById('memo-toolbar');
  const actions   = document.getElementById('memo-edit-actions');
  const saveBtn   = document.getElementById('memo-save-btn');
  const cancelBtn = document.getElementById('memo-cancel-btn');
  const statusEl  = document.getElementById('memo-status');
  const helpBtn   = document.getElementById('tb-help-btn');
  const helpPanel = document.getElementById('tb-help-panel');

  const isMac = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent);
  const K = isMac ? '⌘' : 'Ctrl';

  let loaded  = false;
  let rawMd   = '';
  let editing = false;

  function isOpen() { return section.classList.contains('open'); }

  function renderMd(md) {
    content.innerHTML = md
      ? marked.parse(md)
      : '<p class="memo-empty">memo.md が空です。</p>';
  }

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = 'memo-status' + (type ? ` ${type}` : '');
  }

  function getTableAtCursor() {
    const text = textarea.value;
    const pos  = textarea.selectionStart;
    const allLines = text.split('\n');
    let offset = 0, lineIdx = 0;
    for (let i = 0; i < allLines.length; i++) {
      if (offset + allLines[i].length >= pos) { lineIdx = i; break; }
      offset += allLines[i].length + 1;
    }
    const isTable = l => /^\s*\|/.test(l);
    if (!isTable(allLines[lineIdx])) return null;
    let top = lineIdx, bot = lineIdx;
    while (top > 0 && isTable(allLines[top - 1])) top--;
    while (bot < allLines.length - 1 && isTable(allLines[bot + 1])) bot++;
    return { allLines, top, bot };
  }

  function insertMd(type) {
    const s = textarea.selectionStart, e = textarea.selectionEnd;
    const sel = textarea.value.slice(s, e);

    function wrap(open, close, placeholder) {
      const text = sel || placeholder;
      textarea.setRangeText(open + text + close, s, e, 'end');
      textarea.selectionStart = s + open.length;
      textarea.selectionEnd   = s + open.length + text.length;
    }

    function linePrefix(prefix) {
      const lines = sel
        ? sel.split('\n').map(l => prefix + l).join('\n')
        : prefix + 'item';
      textarea.setRangeText(lines, s, e, 'select');
    }

    function headingPrefix(level) {
      const hashes = '#'.repeat(level) + ' ';
      const lineStart = textarea.value.lastIndexOf('\n', s - 1) + 1;
      const curLine = textarea.value.slice(lineStart, e);
      const stripped = curLine.replace(/^#{1,6}\s/, '');
      textarea.setRangeText(hashes + stripped, lineStart, e, 'end');
    }

    switch (type) {
      case 'bold':        wrap('**', '**', 'bold');   break;
      case 'italic':      wrap('*',  '*',  'italic'); break;
      case 'strike':      wrap('~~', '~~', 'text');   break;
      case 'code':        wrap('`',  '`',  'code');   break;
      case 'h1': headingPrefix(1); break;
      case 'h2': headingPrefix(2); break;
      case 'h3': headingPrefix(3); break;
      case 'ul':        linePrefix('- ');     break;
      case 'ol':        linePrefix('1. ');    break;
      case 'quote':     linePrefix('> ');     break;
      case 'checklist': linePrefix('- [ ] '); break;
      case 'codeblock': {
        const block = sel ? `\`\`\`\n${sel}\n\`\`\`` : '```\ncode\n```';
        const pre = textarea.value.slice(0, s);
        const nl = pre.endsWith('\n') || pre === '' ? '' : '\n';
        textarea.setRangeText(nl + block + '\n', s, e, 'end');
        textarea.selectionStart = s + nl.length + 4;
        textarea.selectionEnd   = s + nl.length + 4 + (sel ? sel.length : 4);
        break;
      }
      case 'link': {
        const text = sel || 'text';
        textarea.setRangeText(`[${text}](url)`, s, e, 'end');
        textarea.selectionStart = s + text.length + 3;
        textarea.selectionEnd   = s + text.length + 6;
        break;
      }
      case 'table': {
        textarea.setRangeText('\n| 列1 | 列2 | 列3 |\n|------|------|------|\n| データ | データ | データ |\n', s, e, 'end');
        break;
      }
      case 'hr': {
        textarea.setRangeText('\n\n---\n\n', s, e, 'end');
        break;
      }
      case 'tablerow': {
        const tbl = getTableAtCursor();
        if (!tbl) { insertMd('table'); return; }
        const { allLines, top, bot } = tbl;
        const colCount = (allLines[top].match(/\|/g) || []).length - 1;
        const newRow = '| ' + Array(colCount).fill('データ').join(' | ') + ' |';
        let botEnd = 0;
        for (let i = 0; i <= bot; i++) botEnd += allLines[i].length + 1;
        botEnd--;
        textarea.setRangeText('\n' + newRow, botEnd, botEnd, 'end');
        textarea.selectionStart = botEnd + 2;
        textarea.selectionEnd   = botEnd + 5;
        break;
      }
      case 'tablecol': {
        const tbl = getTableAtCursor();
        if (!tbl) return;
        const { allLines, top, bot } = tbl;
        const colCount = (allLines[top].match(/\|/g) || []).length - 1;
        let pos = 0;
        const positions = allLines.map(l => { const p = pos; pos += l.length + 1; return p; });
        const topStart = positions[top];
        const botEnd   = positions[bot] + allLines[bot].length;
        const modified = allLines.slice(top, bot + 1).map((line, i) => {
          const t = line.trimEnd();
          if (i === 1) return t + '------|';
          return t + ` ${i === 0 ? `列${colCount + 1}` : 'データ'} |`;
        });
        textarea.setRangeText(modified.join('\n'), topStart, botEnd, 'end');
        break;
      }
      case 'date': {
        const d = new Date();
        const str = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
        textarea.setRangeText(str, s, e, 'end');
        break;
      }
      case 'time': {
        const t = new Date();
        const str = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
        textarea.setRangeText(str, s, e, 'end');
        break;
      }
    }
    localStorage.setItem('memo-draft', textarea.value);
    textarea.focus();
  }

  function enterEditMode() {
    editing = true;
    const draft = localStorage.getItem('memo-draft');
    if (draft && draft !== rawMd) {
      textarea.value = draft;
      setStatus('下書きを復元しました', 'saved');
      setTimeout(() => setStatus(''), 2500);
    } else {
      textarea.value = rawMd;
      setStatus('');
    }
    content.style.display  = 'none';
    textarea.style.display = 'block';
    toolbar.classList.add('visible');
    actions.classList.add('visible');
    editBtn.classList.add('active');
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
  }

  function exitEditMode(discard = false) {
    editing = false;
    content.style.display  = '';
    textarea.style.display = 'none';
    toolbar.classList.remove('visible');
    actions.classList.remove('visible');
    editBtn.classList.remove('active');
    if (discard) renderMd(rawMd);
  }

  async function handleSave() {
    const text = textarea.value;
    saveBtn.disabled = true;
    setStatus('saving…');
    try {
      await saveMemo(text);
      rawMd = text;
      renderMd(rawMd);
      exitEditMode();
      localStorage.removeItem('memo-draft');
      setStatus('saved', 'saved');
      setTimeout(() => setStatus(''), 2000);
    } catch (err) {
      setStatus(`error: ${err.message}`, 'error');
    } finally {
      saveBtn.disabled = false;
    }
  }

  function openPanel() {
    section.classList.add('open');
    toggle.classList.add('active');
    localStorage.setItem('memoOpen', '1');
    if (!loaded) {
      loaded = true;
      loadMemo().then(md => { rawMd = md; renderMd(md); });
    }
  }

  function closePanel() {
    if (editing) exitEditMode(true);
    section.classList.remove('open');
    toggle.classList.remove('active');
    localStorage.setItem('memoOpen', '0');
  }

  toggle.addEventListener('click', () => isOpen() ? closePanel() : openPanel());
  closeBtn.addEventListener('click', closePanel);
  editBtn.addEventListener('click', () => {
    if (!loaded) return;
    editing ? exitEditMode(true) : enterEditMode();
  });
  saveBtn.addEventListener('click', handleSave);
  cancelBtn.addEventListener('click', () => {
    exitEditMode(true);
    localStorage.removeItem('memo-draft');
  });

  // ── Tab キー → 2 スペースインデント ──────────────
  textarea.addEventListener('keydown', ev => {
    if (ev.key !== 'Tab') return;
    ev.preventDefault();
    const ts = textarea.selectionStart, te = textarea.selectionEnd;
    if (ev.shiftKey) {
      const lineStart = textarea.value.lastIndexOf('\n', ts - 1) + 1;
      if (textarea.value.slice(lineStart, lineStart + 2) === '  ') {
        textarea.setRangeText('', lineStart, lineStart + 2, 'preserve');
        localStorage.setItem('memo-draft', textarea.value);
      }
    } else if (ts === te) {
      textarea.setRangeText('  ', ts, te, 'end');
      localStorage.setItem('memo-draft', textarea.value);
    } else {
      const lines = textarea.value.slice(ts, te).split('\n').map(l => '  ' + l).join('\n');
      textarea.setRangeText(lines, ts, te, 'select');
      localStorage.setItem('memo-draft', textarea.value);
    }
  });

  // ── 下書き自動保存 ─────────────────────────────
  textarea.addEventListener('input', () => {
    localStorage.setItem('memo-draft', textarea.value);
  });

  // ── ヘルプボタン ──────────────────────────────
  helpBtn.addEventListener('click', ev => {
    ev.stopPropagation();
    const open = helpPanel.classList.toggle('open');
    if (open) {
      const r = helpBtn.getBoundingClientRect();
      helpPanel.style.top   = (r.bottom + 6) + 'px';
      helpPanel.style.right = (window.innerWidth - r.right) + 'px';
    }
  });
  document.addEventListener('click', () => helpPanel.classList.remove('open'));

  // ── ツールバー ────────────────────────────────
  toolbar.addEventListener('click', e => {
    const btn = e.target.closest('.tb-btn');
    if (!btn || btn.id === 'tb-help-btn') return;
    insertMd(btn.dataset.md);
  });

  // ── OS ごとのキー記号初期化 ───────────────────
  document.querySelector('[data-md="bold"]').title   = `Bold (${K}B)`;
  document.querySelector('[data-md="italic"]').title = `Italic (${K}I)`;
  helpPanel.innerHTML = `
    <div class="tb-help-row"><span>編集開始</span><kbd>e</kbd></div>
    <div class="tb-help-row"><span>保存</span><kbd>${K}S</kbd></div>
    <div class="tb-help-row"><span>キャンセル</span><kbd>Esc</kbd></div>
    <div class="tb-help-row"><span>Bold</span><kbd>${K}B</kbd></div>
    <div class="tb-help-row"><span>Italic</span><kbd>${K}I</kbd></div>
    <div class="tb-help-row"><span>memo 開閉</span><kbd>m</kbd></div>
    <div class="tb-help-row"><span>検索フォーカス</span><div style="display:flex;gap:4px;"><kbd>/</kbd><kbd>${K}K</kbd></div></div>
  `;

  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    const inInput = tag === 'INPUT' || tag === 'TEXTAREA';

    // m: メモ開閉
    if (e.key === 'm' && !inInput && !e.metaKey && !e.ctrlKey) {
      e.preventDefault();
      isOpen() ? closePanel() : openPanel();
      return;
    }

    if (!isOpen()) return;

    // Cmd/Ctrl+S: 保存
    if ((e.ctrlKey || e.metaKey) && e.key === 's' && editing) {
      e.preventDefault();
      handleSave();
      return;
    }

    // Cmd/Ctrl+B / I: ツールバーショートカット
    if ((e.ctrlKey || e.metaKey) && e.key === 'b' && editing) { e.preventDefault(); insertMd('bold');   return; }
    if ((e.ctrlKey || e.metaKey) && e.key === 'i' && editing) { e.preventDefault(); insertMd('italic'); return; }

    // Escape: 編集キャンセルのみ（セクションは閉じない）
    if (e.key === 'Escape' && editing) {
      exitEditMode(true);
      return;
    }

    // e: 編集開始
    if (e.key === 'e' && !inInput && !editing && loaded) {
      e.preventDefault();
      enterEditMode();
    }
  });

  // デフォルト open（前回非表示にした場合のみ閉じる）
  if (localStorage.getItem('memoOpen') !== '0') openPanel();
}

// ── services.js エディタ ──────────────────────────────────────
async function loadServicesText() {
  const res = await fetch('./services.js');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

async function saveServices(text) {
  const res = await fetch('/services.js', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/javascript; charset=utf-8' },
    body: text,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

function initServicesEditor() {
  const toggle    = document.getElementById('svc-toggle');
  const backdrop  = document.getElementById('svc-backdrop');
  const modal     = document.getElementById('svc-modal');
  const closeBtn  = document.getElementById('svc-close');
  const textarea  = document.getElementById('svc-textarea');
  const saveBtn   = document.getElementById('svc-save');
  const cancelBtn = document.getElementById('svc-cancel');
  const statusEl  = document.getElementById('svc-status');

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = 'svc-status' + (type ? ` ${type}` : '');
  }

  function openModal() {
    modal.classList.add('open');
    backdrop.classList.add('open');
    setStatus('loading…');
    loadServicesText().then(text => {
      textarea.value = text;
      setStatus('');
      textarea.focus();
    }).catch(err => setStatus(`load error: ${err.message}`, 'error'));
  }

  function closeModal() {
    modal.classList.remove('open');
    backdrop.classList.remove('open');
  }

  async function handleSave() {
    saveBtn.disabled = true;
    setStatus('saving…');
    try {
      await saveServices(textarea.value);
      setStatus('saved — reloading…', 'saved');
      setTimeout(() => location.reload(), 800);
    } catch (err) {
      setStatus(`error: ${err.message}`, 'error');
      saveBtn.disabled = false;
    }
  }

  toggle.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  backdrop.addEventListener('click', closeModal);
  cancelBtn.addEventListener('click', closeModal);
  saveBtn.addEventListener('click', handleSave);
  document.addEventListener('keydown', e => {
    if (!modal.classList.contains('open')) return;
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); handleSave(); }
    if (e.key === 'Escape') closeModal();
  });
}

// ── エントリポイント ─────────────────────────────────────────
if (typeof SERVICES !== 'undefined') {
  render(SERVICES);
  initCatFilter(SERVICES);
  initViewToggle();
  initSearch(SERVICES);
  initMemo();
  initServicesEditor();
} else {
  document.getElementById('main').innerHTML =
    '<div class="load-error">⚠ services.js が見つかりません。index.html と同じフォルダに置いてください。</div>';
}
</script>
</body>
</html>
